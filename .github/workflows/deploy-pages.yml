name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTIONS: "true"
      NEXT_PUBLIC_BASE_PATH: "/asgoflux"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # --- Root site (asog_flux) -> served at /asgoflux/ ---
      - name: Install dependencies (root)
        run: npm ci

      - name: Build root site
        run: npm run build

      # --- Landing page -> served at /asgoflux/landing/ ---
      - name: Install dependencies (landing)
        working-directory: Landing
        run: npm ci

      - name: Build landing site
        working-directory: Landing
        env:
          NEXT_PUBLIC_BASE_PATH: "/asgoflux/landing"
        run: npm run build

      - name: Merge landing into root out/
        run: |
          rm -rf out/landing
          mkdir -p out/landing
          cp -R Landing/out/. out/landing/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
