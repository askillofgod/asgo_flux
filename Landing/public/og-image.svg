<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04060f"/>
      <stop offset="0.55" stop-color="#0a1126"/>
      <stop offset="1" stop-color="#040816"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.0" r="0.7">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.95" cy="0.05" r="0.7">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#cbd5ff"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark -->
  <g transform="translate(80,80)">
    <rect width="60" height="60" rx="14" fill="url(#logoGrad)"/>
    <text x="30" y="44" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-size="34" font-weight="900" fill="#ffffff">A</text>
  </g>
  <g transform="translate(160,98)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.5">ASOG</text>
    <text y="22" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)" letter-spacing="2">정찰제 홈페이지 제작소</text>
  </g>

  <!-- Tag pill -->
  <g transform="translate(80,210)">
    <rect width="270" height="38" rx="19" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)"/>
    <circle cx="22" cy="19" r="4" fill="#38bdf8"/>
    <text x="36" y="25" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.92)">가격이 투명한 AI 웹디자인 스튜디오</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80,290)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-size="78" font-weight="900" fill="#ffffff" letter-spacing="-2">정찰제 홈페이지</text>
    <text y="88" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-size="78" font-weight="900" fill="url(#textGrad)" letter-spacing="-2">제작</text>
    <text x="270" y="88" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-size="78" font-weight="900" fill="#ffffff" letter-spacing="-2">서비스</text>
  </g>

  <!-- Sub line -->
  <text x="80" y="478" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.78)" letter-spacing="-0.2">랜딩페이지 · 상세페이지 · 웹사이트 — 가격이 먼저 보입니다.</text>

  <!-- Price strip -->
  <g transform="translate(80,520)">
    <rect width="280" height="60" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)"/>
    <rect x="14" y="14" width="64" height="32" rx="8" fill="url(#badgeGrad)"/>
    <text x="46" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff" letter-spacing="1.2">FROM</text>
    <text x="94" y="30" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.7)">원페이지</text>
    <text x="94" y="50" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-size="22" font-weight="900" fill="#ffffff">50만 원 –</text>
  </g>

  <!-- URL -->
  <text x="1120" y="595" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">asog-landing.pages.dev</text>
</svg>
